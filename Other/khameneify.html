<body>

  <div class="container">
    <header>
      <div class="eyebrow" id="eyebrow">everyone will feel it</div>
      <h1 id="title">Khameneify</h1>
    </header>

    <div class="grid">

      <!-- Source image panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-label">Your Photo</span>
        </div>
        <div class="panel-body">
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*">
            <span class="upload-icon">⬡</span>
            <div class="upload-text">Drop an image or click to upload</div>
          </div>
          <img id="preview-img" alt="preview">
          <a class="reset-link" id="reset-link">✕ Remove photo</a>
        </div>
      </div>

      <!-- Result panel -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-label" id="resultTitle">Khameneified</span>
        </div>
        <div class="panel-body" style="padding:0">
          <div class="result-area" id="result-area">
            <div class="result-placeholder" id="result-placeholder">
              <span class="big-symbol">☽</span>
              <p>Awaiting transformation</p>
            </div>
            <img id="result-img" alt="result" style="display:none">
            <div class="loading-overlay" id="loading-overlay">
              <div class="spinner"></div>
              <div class="loading-text" id="loading-text">Transforming...</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Action bar -->
    <div class="bottom-bar">
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Upload a photo to begin</span>
      </div>
      <div class="btn-group">
        <a id="download-btn" class="btn btn-ghost" download="khameneified.png">↓ Download</a>
        <button class="btn btn-primary" id="run-btn" disabled>Khameneify</button>
      </div>
    </div>

    <footer id="footer">Khameneify &nbsp;·&nbsp; For entertainment purposes only &nbsp;·&nbsp; © 1989-2026 Israel. All rights reserved.</footer>
  </div>

  <script>
    // ─── DOM refs ──────────────────────────────────────────────────────────────
    const fileInput = document.getElementById("file-input");
    const uploadZone = document.getElementById("upload-zone");
    const previewImg = document.getElementById("preview-img");
    const resetLink = document.getElementById("reset-link");
    const resultImg = document.getElementById("result-img");
    const resultPlaceholder = document.getElementById("result-placeholder");
    const loadingOverlay = document.getElementById("loading-overlay");
    const loadingText = document.getElementById("loading-text");
    const runBtn = document.getElementById("run-btn");
    const downloadBtn = document.getElementById("download-btn");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");

    // ─── State ─────────────────────────────────────────────────────────────────
    let imageBase64 = null;
    let imageMimeType = null;
    let originalFileName = null;
    let mode = null;


    // ─── Theme handling ────────────────────────────────────────────────────────
    const versions = {
      epstein: {
        title: "Epstienify",
        eyebrow: "███ porn. My very 1st feature: \"With mustard, please\"",
        resultTitle: "Epstienified",
        "run-btn": "Epstienify",
        //footer: "Epstienify &nbsp;·&nbsp; For entertainment purposes only"
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const modeParam = urlParams.get("m");
    const data = versions[modeParam];

    if (data) {
      for (const [key, value] of Object.entries(data)) {
        document.getElementById(key).innerHTML = value;
      }
      mode = modeParam;

      const newloc = url = new URL(window.location.href);
      newloc.search = "";
      window.history.replaceState({}, "", newloc);
      window.location.reload();
    }

    // ─── Upload handlers ───────────────────────────────────────────────────────
    fileInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (file) processFile(file);
    });

    uploadZone.addEventListener("dragover", e => {
      e.preventDefault();
      uploadZone.classList.add("drag-over");
    });

    uploadZone.addEventListener("dragleave", () => {
      uploadZone.classList.remove("drag-over");
    });

    uploadZone.addEventListener("drop", e => {
      e.preventDefault();
      uploadZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) processFile(file);
    });

    function processFile(file) {
      imageMimeType = file.type;
      originalFileName = file.name.replace(/\.[^.]+$/, '');
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        imageBase64 = dataUrl.split(",")[1];

        // Show preview, hide dropzone
        previewImg.src = dataUrl;
        previewImg.style.display = "block";
        uploadZone.style.display = "none";
        resetLink.style.display = "block";

        setStatus("", "Ready");
        runBtn.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    // Reset back to upload state
    resetLink.addEventListener("click", () => {
      imageBase64 = null;
      imageMimeType = null;
      fileInput.value = "";
      previewImg.src = "";
      previewImg.style.display = "none";
      uploadZone.style.display = "";
      resetLink.style.display = "none";
      runBtn.disabled = true;
      setStatus("", "Upload a photo to begin");
    });

    // ─── Run ───────────────────────────────────────────────────────────────────
    runBtn.addEventListener("click", async () => {
      if (!imageBase64) return;

      // Lock UI
      runBtn.disabled = true;
      loadingOverlay.classList.add("visible");
      setStatus("loading", "Transforming...");

      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycby8h9Cvf-Qqr_qHGQ8dP5D8CsB0etdCHVntt_qO8jGE_tET3dpnOllby5llVDueFqC3/exec", {
          method: "POST",
          body: JSON.stringify({
            mode,
            image: imageBase64,
            mimeType: imageMimeType
          })
        });
        const data = await res.json();
        if (data.result !== "ok") throw new Error(data.info);

        const imgSrc = `data:${data.data.mimeType};base64,${data.data.data}`;
        showResult(imgSrc);
      } catch (err) {
        setStatus("error", "There was an issue"); // I am NOT showing the error messages from my backend to the user 😭
        console.error(err);
      } finally {
        loadingOverlay.classList.remove("visible");
        runBtn.disabled = false;
      }
    });

    function showResult(imgSrc) {
      resultImg.src = imgSrc;
      resultImg.style.display = "block";
      resultPlaceholder.style.display = "none";
      downloadBtn.href = imgSrc;
      downloadBtn.download = `${originalFileName}-khameneified.png`;
      downloadBtn.style.display = "inline-block";
      setStatus("success", "Done");
    }

    // state: "" | "loading" | "success" | "error"
    function setStatus(state, msg) {
      statusDot.className = "status-dot" + (state ? " " + state : "");
      statusText.textContent = msg;
    }
  </script>
