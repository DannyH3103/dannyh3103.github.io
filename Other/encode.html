<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thingy from cool video</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            border: 3px solid black;
            padding: 30px;
            flex: 1;
            height: 600px;
            min-width: 300px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid black;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: fit-content;
            align-self: center;
            padding: 5px 20px;
            background: white;
            border: 2px solid black;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:active {
            background-color: #ddd;
        }

        .output-box {
            border: 2px solid black;
            height: 100%;
            padding: 10px;
            margin-top: 10px;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow: auto;
        }

        .label-text {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .notice {
            position: absolute;
            bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Encode</h1>
            <div>
                <div class="label-text">Visible text</div>
                <input type="text" id="visibleInput" placeholder="Enter public text...">
            </div>
            <div>
                <div class="label-text">Secret message</div>
                <input type="text" id="secretInput" placeholder="Enter hidden message...">
            </div>
            <div>
                <div class="label-text">Index</div>
                <input type="text" id="secretIndex" placeholder="Enter secret start index or leave blank for auto...">
            </div>
            <button onclick="handleEncode()">SUBMIT</button>
            <div class="output-box" id="encodeOutput"></div>
        </div>

        <div class="card">
            <h1>Decode</h1>
            <div>
                <div class="label-text">Text with secret</div>
                <input type="text" id="decodeInput" placeholder="Paste encoded text here...">
            </div>
            <button onclick="handleDecode()">SUBMIT</button>
            <div class="output-box" id="decodeOutput"></div>
        </div>
    </div>

    <div class="notice">This website is based on and inspired by <a href="https://www.youtube.com/watch?v=4LhL9ypdbQU">this awesome video</a>.</div>

    <script>
        const zws = "​" //binary zero
        const zwnj = "‌" //binary one
        const zwj = "‍" //flag


        function hideText(visibleText, hiddenString, index) {
            return visibleText.slice(0, index ?? visibleText.indexOf(' ')) + zwj + hiddenString.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0').replaceAll('0', zws).replaceAll('1', zwnj)).join('') + zwj + visibleText.slice(index ?? visibleText.indexOf(' '));
        }

        function extractText(input) {
            return input.split(zwj)[1].match(/.{1,8}/g).map(bin => String.fromCharCode(parseInt(bin.replaceAll(zws, '0').replaceAll(zwnj, '1'), 2))).join("");
        }

        function handleEncode() {
            const visible = document.getElementById('visibleInput').value;
            const secret = document.getElementById('secretInput').value;
            const index = document.getElementById('secretIndex').value;
            const output = document.getElementById('encodeOutput');
            
            if(!visible || !secret) {
                output.innerText = "Please fill all fields.";
                return;
            }
            else if (isNaN(Number(index))) {
                output.innerText = "Make sure index is a number or leave blank for auto index.";
                return;
            }

            output.innerText = hideText(visible, secret, Number(index));
        }

        function handleDecode() {
            const input = document.getElementById('decodeInput').value;
            const output = document.getElementById('decodeOutput');
            
            if(!input) {
                output.innerText = "Please enter text to decode.";
                return;
            }

            output.innerText = extractText(input);
        }
    </script>


</body></html>
